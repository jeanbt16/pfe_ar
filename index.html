<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>My First WebAR Poster</title>

    <!-- 1. THE AR LIBRARIES -->
    <!-- These scripts load A-Frame (the 3D HTML canvas) and 8th Wall UI extras -->
    <script src="https://cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
    <script src="https://cdn.8thwall.com/web/xrextras/xrextras.js"></script>

    <!-- 2. THE 8TH WALL BRAIN -->
    <!-- This links to the standalone engine you downloaded -->
    <script async src="./engine/xr.js" data-preload-chunks="slam"></script>

    <!-- 3. THE EYES (IMAGE CONFIGURATION) -->
    <!-- This script tells the AR engine what image to look for in the real world -->
    <script>
      const onxrloaded = () => {
        XR8.XrController.configure({
          imageTargetData:[{
            "name": "my-poster",         // A nickname for your image
            "type": "PLANAR",            // It is a flat image (not a cylinder/cone)
            "imagePath": "./assets/imagesource.png", 
            "properties": {
              "left": 0, "top": 0, 
              "width": 480, "height": 640,          // The dimensions we saved it as
              "originalWidth": 480, "originalHeight": 640,
              "isRotated": false
            }
          }]
        });
      };
      // Wait for the AR Engine to be ready before giving it the image
      window.XR8 ? onxrloaded() : window.addEventListener('xrloaded', onxrloaded);
    </script>
  </head>

  <body>
    <!-- 4. THE SCENE -->
    <!-- This is our 3D canvas. We disable "World Tracking" to save battery since we only care about the image. -->
    <a-scene
      xrextras-gesture-detector
      xrextras-almost-there
      xrextras-loading
      xrextras-runtime-error
      xrweb="disableWorldTracking: true">

      <a-assets>
        <a-asset-item id="model" src="./assets/ville3D.glb"></a-asset-item>
      </a-assets>
      <!-- The virtual camera that matches your phone camera -->
      <a-camera position="0 4 10"></a-camera>

      <!-- 5. THE MAGIC POSTER LAYER -->
      <!-- We use the exact name we configured in the script above ("my-poster") -->
      <xrextras-named-image-target name="my-poster">
        
        <!-- EVERYTHING INSIDE HERE SHOWS UP ON TOP OF THE REAL WORLD POSTER -->
        
        <!-- A floating cathedrale -->
        

        
          <a-entity scale="1 1 1" position="0 0 0" rotation="90 0 0" gltf-model="#model"></a-entity>
        
        
        <!-- Floating Text -->
        <a-text value="Graphic Design is AR!" color="white" align="center" position="0 1.5 0"></a-text>

      </xrextras-named-image-target>

    </a-scene>
  </body>
</html>
